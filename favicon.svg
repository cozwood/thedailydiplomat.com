  <circle cx="256" cy="256" r="155" fill="#b03a2a"/>
  <circle cx="256" cy="256" r="130" fill="#c04030"/>
  <circle cx="256" cy="256" r="105" fill="none" stroke="#e8c0b0" stroke-width="5" opacity="0.3"/>

  <!-- Bold D -->
