<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4a2e"/>
      <stop offset="100%" stop-color="#3d2210"/>
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddb870"/>
      <stop offset="100%" stop-color="#c49240"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Outer diplomatic seal ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gd)" stroke-width="3" opacity="0.25"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#gd)" stroke-width="5" opacity="0.4"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gd)" stroke-width="1.5" opacity="0.2"/>

  <!-- Compass / crosshair ticks (intelligence aesthetic) -->
  <line x1="256" y1="36" x2="256" y2="72" stroke="#c49240" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="440" x2="256" y2="476" stroke="#c49240" stroke-width="2.5" opacity="0.5"/>
  <line x1="36" y1="256" x2="72" y2="256" stroke="#c49240" stroke-width="2.5" opacity="0.5"/>
  <line x1="440" y1="256" x2="476" y2="256" stroke="#c49240" stroke-width="2.5" opacity="0.5"/>

  <!-- Diagonal ticks -->
  <line x1="100" y1="100" x2="122" y2="122" stroke="#c49240" stroke-width="1.5" opacity="0.3"/>
  <line x1="412" y1="100" x2="390" y2="122" stroke="#c49240" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="412" x2="122" y2="390" stroke="#c49240" stroke-width="1.5" opacity="0.3"/>
  <line x1="412" y1="412" x2="390" y2="390" stroke="#c49240" stroke-width="1.5" opacity="0.3"/>

  <!-- Globe wireframe — longitude lines -->
  <ellipse cx="256" cy="256" rx="120" ry="140" fill="none" stroke="#c49240" stroke-width="2" opacity="0.35"/>
  <ellipse cx="256" cy="256" rx="60" ry="140" fill="none" stroke="#c49240" stroke-width="1.5" opacity="0.25"/>
  <line x1="256" y1="116" x2="256" y2="396" stroke="#c49240" stroke-width="1.5" opacity="0.25"/>

  <!-- Globe wireframe — latitude lines -->
  <ellipse cx="256" cy="256" rx="120" ry="30" fill="none" stroke="#c49240" stroke-width="1.5" opacity="0.25"/>
  <ellipse cx="256" cy="210" rx="105" ry="22" fill="none" stroke="#c49240" stroke-width="1" opacity="0.18"/>
  <ellipse cx="256" cy="302" rx="105" ry="22" fill="none" stroke="#c49240" stroke-width="1" opacity="0.18"/>

  <!-- Center point — focal node -->
  <circle cx="256" cy="256" r="6" fill="#c49240" opacity="0.7"/>
  <circle cx="256" cy="256" r="12" fill="none" stroke="#c49240" stroke-width="1.5" opacity="0.35"/>

</svg>
